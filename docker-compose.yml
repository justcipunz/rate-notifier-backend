services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rate_notifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d rate_notifier"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: ["/app/api"]
    environment:
      APP_PORT: ${APP_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-12h}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    command: ["/app/worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RATE_PROVIDER_URL: ${RATE_PROVIDER_URL}
      RATE_FETCH_INTERVAL: ${RATE_FETCH_INTERVAL:-5m}
      RATE_PROVIDER_TIMEOUT: ${RATE_PROVIDER_TIMEOUT:-10s}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
