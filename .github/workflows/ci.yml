name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.6"

      - run: go mod download

      - run: go vet ./...

      - run: go test ./...

      - run: go build ./cmd/api

      - run: go build ./cmd/worker

      - run: docker build -t rate-notifier .
